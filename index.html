<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/x-icon" href="/terminal.ico" />
    <!-- interactive-widget=resizes-content: the software keyboard shrinks the
         layout viewport so the prompt stays visible. Pinch-zoom stays enabled
         (no maximum-scale) — input font-size >=16px prevents iOS auto-zoom. -->
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover, interactive-widget=resizes-content"
    />
    <title>Matthew Myrick — Terminal Portfolio</title>
    <meta
      name="description"
      content="Infrastructure / Platform Engineer & SRE. An interactive terminal portfolio — type help to explore. Self-hosted from my home lab."
    />

    <!-- Open Graph (LinkedIn / social share preview) -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://matthewjmyrick.com/" />
    <meta property="og:title" content="Matthew Myrick — Terminal Portfolio" />
    <meta
      property="og:description"
      content="Infrastructure / Platform Engineer & SRE. An interactive terminal portfolio — type help to explore. Self-hosted from my home lab."
    />
    <meta property="og:image" content="https://matthewjmyrick.com/og.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />

    <!-- Twitter/X card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Matthew Myrick — Terminal Portfolio" />
    <meta
      name="twitter:description"
      content="Infrastructure / Platform Engineer & SRE. An interactive terminal portfolio — type help to explore."
    />
    <meta name="twitter:image" content="https://matthewjmyrick.com/og.png" />
    <!-- Per-terminal fonts (Ghostty → JetBrains Mono, Warp → Fira Code). -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500;700&family=JetBrains+Mono:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
